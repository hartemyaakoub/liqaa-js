name: ✨ Feature request
description: Suggest a new SDK feature or API improvement
title: '[Feature] '
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A short description of the use case driving this request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What API or behaviour would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: How are you working around this today? Any other approaches?

  - type: input
    id: severity
    attributes:
      label: How important is this for you?
      placeholder: 'Critical / Nice to have'
