name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions:
  contents: read

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

  size:
    name: bundle size
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build --if-present
      - name: Report sdk.js size
        run: |
          if [ -f public/sdk.js ]; then
            BYTES=$(wc -c < public/sdk.js)
            GZIPPED=$(gzip -c public/sdk.js | wc -c)
            echo "Raw:     $BYTES bytes"
            echo "Gzipped: $GZIPPED bytes"
            echo "## SDK bundle size" >> $GITHUB_STEP_SUMMARY
            echo "| | bytes |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| Raw     | $BYTES |" >> $GITHUB_STEP_SUMMARY
            echo "| Gzipped | $GZIPPED |" >> $GITHUB_STEP_SUMMARY
          fi
